# =============================================================================
# Mob Stat Pool Configuration
# =============================================================================
# Controls how stat points are generated and distributed for scaled mobs.
#
# OVERVIEW:
# ---------
# When a mob spawns, it receives a "stat pool" based on:
#   1. Mob level (from nearby player levels)
#   2. Distance bonus (from spawn location distance to origin)
#
# This pool is then distributed across 30 different stats using a Dirichlet
# distribution, creating natural variation where each mob specializes in
# different areas (tanky, fast, hard-hitting, etc.)
#
# FORMULA:
#   total_pool = (mob_level * points_per_level) + distance_bonus
#   stat_value = base_value + (pool_share * conversion_factor)
#
# =============================================================================

# -----------------------------------------------------------------------------
# PROGRESSIVE SCALING (Early-Game Balance)
# -----------------------------------------------------------------------------
# Makes low-level mobs weaker, gradually ramping up to full power.
# This prevents new players from being overwhelmed at the start.
#
# FORMULA:
#   scaling_factor = min_scaling_factor + (1 - min_scaling_factor) * (level / soft_cap_level)
#   effective_pool = level * points_per_level * scaling_factor
#
# EXAMPLE (with min_scaling_factor=0.15, soft_cap_level=30):
#   Level 1:  0.15 + 0.85 * (1/30)  = 0.178 (17.8% power)
#   Level 5:  0.15 + 0.85 * (5/30)  = 0.292 (29.2% power)
#   Level 10: 0.15 + 0.85 * (10/30) = 0.433 (43.3% power)
#   Level 20: 0.15 + 0.85 * (20/30) = 0.717 (71.7% power)
#   Level 30+: 1.0 (100% power - full scaling)
#
# This creates a smooth difficulty curve where:
#   - Level 1 mobs deal ~1/6 of their potential damage (easier early game)
#   - Difficulty ramps up gradually as players level
#   - By level 30, mobs are at full power

progressive_scaling:
  # Enable/disable progressive scaling
  # Set to false to use flat scaling (mobs at full power from level 1)
  # Default: true
  enabled: true

  # Level at which mobs reach 100% of their calculated power
  # Lower values = faster ramp to full difficulty
  # Higher values = longer "easy" period for new players
  # Default: 30 (extended from 20 for smoother early-game curve)
  soft_cap_level: 50

  # Minimum scaling factor at level 1
  # 0.1 = level 1 mobs have 10% of their calculated power (~13 HP, 4-5 shot)
  # 0.15 = level 1 mobs have 15% of their calculated power (easier early game)
  # 0.3 = level 1 mobs have 30% of their calculated power
  # 0.5 = level 1 mobs have 50% of their calculated power
  # Default: 0.1
  min_scaling_factor: 0.1

# -----------------------------------------------------------------------------
# POOL GENERATION
# -----------------------------------------------------------------------------
# These settings control how many stat points mobs receive.

# Points added to the stat pool per mob level
# Higher = stronger mobs at all levels
# Default: 15.0 (a level 10 mob gets 150 base pool points)
points_per_level: 20.0

# Bonus pool points per block of distance from world origin (0,0)
# This makes mobs progressively stronger as players explore further
# Default: 0.3 (at 1000 blocks = 300 bonus points)
distance_bonus_per_block: 0.5

# Pool multipliers for special mob types (applied after base calculation)
# These stack with classification multipliers from mob-classification.yml
boss_pool_multiplier: 1.5
elite_pool_multiplier: 1.25

# -----------------------------------------------------------------------------
# DIRICHLET DISTRIBUTION
# -----------------------------------------------------------------------------
# Controls how the stat pool is distributed across different stats.
#
# NOTE: dirichlet_precision is NOT YET WIRED into DirichletDistributor.
# The value loads and validates but has no effect on stat generation.
# The actual distribution variance is controlled solely by per-stat
# alpha_weight values below. This field is retained for future use:
# when wired, it would multiply all alpha weights, controlling global
# variance (lower = more extreme specialization, higher = more uniform).
#
# Per-stat alpha_weight meanings (these ARE active):
# - Lower alpha (e.g., 0.1): Stat rarely gets pool share, but can spike
# - alpha = 1.0: Normal allocation weight
# - Higher alpha (e.g., 2.0): Stat consistently gets more pool share

dirichlet_precision: 0.5  # NOT ACTIVE — see note above

# -----------------------------------------------------------------------------
# STAT CONFIGURATIONS
# -----------------------------------------------------------------------------
# Each stat has the following properties:
#
#   factor:       Conversion factor (pool_share * factor = stat bonus)
#   base_value:   Starting value before pool distribution
#   min_value:    Minimum allowed value (floor)
#   max_value:    Maximum allowed value (cap)
#   alpha_weight: Relative weight in Dirichlet distribution (higher = more pool)
#
# STAT CATEGORIES:
#   - Combat: Health, damage, armor
#   - Movement: Speed, attack timing, range
#   - Critical: Crit chance and multiplier
#   - Defense: Dodge, block, parry
#   - Sustain: Life steal, health regen
#   - Elemental Damage: Fire, cold, lightning, chaos
#   - Elemental Resistance: Resistances to elemental damage
#   - AI: Aggro range, reaction times
#   - Special: Armor penetration, true damage

