# -----------------------------------------------------------------------------
# MOB ARCHETYPES
# -----------------------------------------------------------------------------
# Predefined weight profiles for different mob combat styles.
# Each archetype adjusts the alpha weights for all 52 stats.
#
# Format: archetype_name: [weight for each stat in order]
# Stats order: max_health, physical_damage, armor, move_speed, attack_speed,
#              attack_range, attack_cooldown, critical_chance, critical_multiplier,
#              dodge_chance, block_chance, parry_chance, life_steal, health_regen,
#              fire_damage, water_damage, lightning_damage, earth_damage, wind_damage, void_damage,
#              fire_resistance, water_resistance, lightning_resistance, earth_resistance, wind_resistance, void_resistance,
#              fire_penetration, water_penetration, lightning_penetration, earth_penetration, wind_penetration, void_penetration,
#              fire_increased_damage, water_increased_damage, lightning_increased_damage, earth_increased_damage, wind_increased_damage, void_increased_damage,
#              fire_more_damage, water_more_damage, lightning_more_damage, earth_more_damage, wind_more_damage, void_more_damage,
#              aggro_range, reaction_delay, charge_time, charge_distance,
#              armor_penetration, true_damage, accuracy, knockback_resistance
#
# Weight meanings:
#   0.5 = Half normal allocation
#   1.0 = Normal allocation
#   2.0 = Double allocation
#   2.5 = Heavy focus on this stat

archetypes:
  # Balanced melee fighter - good at everything combat-related
  warrior:
    - 2.5   # max_health        - HIGH: can take hits
    - 2.5   # physical_damage   - HIGH: primary damage dealer
    - 2.0   # armor             - HIGH: damage reduction
    - 0.8   # move_speed        - LOW: not fast
    - 0.8   # attack_speed      - LOW: heavy swings
    - 0.8   # attack_range      - LOW: melee
    - 1.5   # attack_cooldown   - MEDIUM: steady attacks
