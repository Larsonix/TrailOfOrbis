# -----------------------------------------------------------------------------
# BALANCE NOTES
# -----------------------------------------------------------------------------
#
# EXAMPLE CALCULATIONS (Level 10 mob at 500 blocks):
#   base_pool = 10 * 15.0 = 150
#   distance_bonus = 500 * 0.3 = 150
#   total_pool = 300
#
#   With even distribution (300 / 42 stats = ~7.1 per stat):
#   - max_health: 100 + (10.7 * 0.88) = ~109 HP
#   - physical_damage: 10 + (10.7 * 0.067) = ~10.7 damage
#   - critical_chance: 5 + (10.7 * 0.11) = ~6.2%
#
# TUNING TIPS:
# - Increase points_per_level for faster power scaling
# - Decrease distance_bonus_per_block for slower exploration difficulty
# - Adjust individual stat factors to buff/nerf specific mechanics
# - Modify alpha_weights to change which stats mobs tend to specialize in
# - Use max_value caps to prevent extreme outliers
