# =============================================================================
# Weapon Speed Profiles
# =============================================================================
# Each profile controls how attack speed stats affect a specific weapon type.
#
# CURRENTLY UNIFORM: All weapons scale identically for baseline testing.
# Per-weapon differentiation (daggers faster, battleaxes heavier) will be
# tuned after confirming the base system feels correct on all weapon types.
#
# statWeights: multiplier on stat benefit (1.0 = normal)
# speedLimits: min/max multiplier bounds + animation scale (1.0 = matches server)
# comboStages: max combo stages (3 for melee, 1 for ranged/magic)
# comboResetMs: ms before combo resets to stage 1
# baseComboPercent: universal combo speed bonus per hit
# =============================================================================

profiles:

  # =========================================
  # ONE-HANDED MELEE
  # =========================================

  sword:
    weaponTypes: [SWORD]
    animationSets: [Sword]
    category: melee
    comboStages: 3
    comboResetMs: 1000
    baseComboPercent: 1.0
    statWeights:
      attackSpeedPercent: 1.0
      cooldownRecoveryPercent: 1.0
      comboSpeedBonus: 1.0
    speedLimits:
      minMultiplier: 0.5
      maxMultiplier: 3.0
      animationSpeedScale: 1.0

