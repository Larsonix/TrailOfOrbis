# =============================================================================
# GEAR MODIFIERS CONFIGURATION
# =============================================================================
# Defines all modifiers that can roll on gear.
# Each modifier has: type, stat, scaling, weight, and restrictions.
#
# DESIGN: "Action vs Sustain" Classification
# - PREFIXES = Action (what you DO): damage, speed, movement, ailments
# - SUFFIXES = Sustain (what you HAVE): resources, defenses, recovery
#
# SLOT IDENTITY (Feb 2026 refactor):
# - Weapons + Gloves = OFFENSIVE (damage, crit, speed)
# - Armor + Shield = DEFENSIVE (resources, resistances, regen)
# - Gloves (hands) are hybrid: offensive prefixes + material-based suffixes
# - Shields are hybrid: thorns/accuracy prefixes + defensive suffixes
#
# REQUIREMENT MAPPING (May 2026 refactor):
# required_attribute follows the "1 stat = 1 attribute" rule:
# the element that grants the stat owns the requirement.
# The authoritative mapping is in GearConfigLoader.STAT_REQUIREMENT_OVERRIDES.
# Values here are documentation — the Java override always wins.
# =============================================================================

