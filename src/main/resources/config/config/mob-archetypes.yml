# =============================================================================
# Mob Archetype Configuration
# =============================================================================
# Archetypes define combat identity: how a mob fights, not what faction it is.
# 8 archetypes validated against 78 actual Hytale NPC IDs.
#
# Archetype stat multipliers are defined in the MobArchetype enum (Java code).
# This config controls auto-assignment: which mob gets which archetype.

# Keyword-based archetype detection (scanned from role names)
keywords:
  brute: [brute, ogre, mauler, brawler, berserker, marauder, aberrant]
  warrior: [warrior, fighter, scrapper, soldier, striker]
  ranger: [archer, ranger, hunter, gunner, lobber, scout]
  caster: [mage, archmage, wizard, shaman, sorcerer, priest, cultist]
  assassin: [assassin, stalker, thief, seeker]
  tank: [guard, defender, sentry, knight]

# NPCGroup-based detection (animals without role keywords)
group_archetypes:
  beast: [Prey, PreyBig, Animals, Beasts, Critters]

# Explicit per-role overrides (role_name → archetype name)
# Use this for edge cases where keywords/groups don't produce the right result.
overrides: {}

# Noise settings — small Gaussian variation per stat (does NOT affect resistances)
noise:
  enabled: true
  standard_deviation: 0.10   # 10% standard deviation
  max_deviation: 0.15        # clamp at ±15%
