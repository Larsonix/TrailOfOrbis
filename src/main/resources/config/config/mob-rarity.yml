# =============================================================================
# Mob Rarity Tier Configuration
# =============================================================================
# Three tiers: Normal, Elite, Boss. Each with stat multipliers.
# Boss difficulty = HP + mechanics, NOT damage (PoE philosophy).

tiers:
  normal:
    hp: 1.0
    damage: 1.0
    armor: 1.0
    evasion: 1.0
    speed: 1.0
    xp: 1.0
    iiq: 1.0
    iir: 1.0
    ailment_effectiveness: 1.0

  elite:
    hp: 2.5
    damage: 1.3
    armor: 1.5
    evasion: 1.3
    speed: 1.1
    xp: 3.0
    iiq: 3.0
    iir: 2.0
    ailment_effectiveness: 0.7

  boss:
    hp: 8.0
    damage: 1.5
    armor: 2.0
    evasion: 1.0
    speed: 1.0
    xp: 10.0
    iiq: 10.0
    iir: 8.0
    ailment_effectiveness: 0.4

# Realm-specific overrides (endgame content is tougher)
realm_overrides:
  elite:
    hp: 3.0
  boss:
    hp: 12.0

# Elite spawn chance formula: min(base + level × per_level, max)
elite_spawn:
  base_chance: 0.05
  chance_per_level: 0.0001
  max_chance: 0.25
