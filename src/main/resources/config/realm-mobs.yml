# ═══════════════════════════════════════════════════════════════════
# Realm Mob Pool Configuration
# ═══════════════════════════════════════════════════════════════════
# Defines which mobs spawn in each biome type.
#
# IMPORTANT: Mob IDs MUST match exact Hytale NPC role names (PascalCase)!
# Invalid IDs will silently fail to spawn. Check server logs for
# "Unknown NPC type" warnings.
#
# Elite System:
# Elite is a SPAWN-TIME MODIFIER, not a mob pool. Any mob (regular or boss)
# can roll to become elite at spawn time based on the elite chance settings.
# Elite mobs receive bonus stats (2x stats, 1.5x health, 3x XP).
# An elite boss is possible and gets BOTH elite AND boss multipliers!

# ═══════════════════════════════════════════════════════════════════
# Spawn Settings
# ═══════════════════════════════════════════════════════════════════

spawn-settings:
  # Base chance for a mob to roll elite at spawn (5%)
  # This applies to ANY mob (regular or boss)
  base-elite-chance: 0.05

  # Additional elite chance per realm level (+0.01% per level)
  elite-chance-per-level: 0.0001

  # Maximum elite spawn chance (25%)
  max-elite-chance: 0.25

  # Base chance for boss mob spawn (% of total mobs drawn from boss pool)
  base-boss-chance: 0.03

  # Additional boss chance per realm level (+0.05% per level)
  boss-chance-per-level: 0.0005

  # Maximum boss spawn chance (10% cap)
  max-boss-chance: 0.10

  # Visual scale multipliers — make special mobs visually larger
  # 1.0 = normal size, 1.5 = 50% bigger. Stacks: elite boss = elite × boss
  elite-scale: 1.20
  boss-scale: 1.50

  # Minimum distance from player for spawns (blocks)
  min-distance: 20

  # Maximum distance from player for spawns (blocks)
  max-distance: 50

  # Number of mobs to spawn per batch
  batch-size: 5

  # Ticks between spawn batches (100 = 5 seconds)
  interval-ticks: 100

  # Safe zone around player spawn point where mobs cannot spawn (blocks)
  # This prevents mobs from spawning directly at the realm entry/respawn location
  # Different from min-distance which controls distance from players during gameplay
  # Set to 0 to disable
  spawn-exclusion-radius: 20

  # Player count scaling - mobs get stronger with more players
  # Formula: multiplier^(playerCount - 1)
  # With 2 players: 1.2^1 = 1.2x stats
  # With 3 players: 1.2^2 = 1.44x stats
  # With 4 players: 1.2^3 = 1.728x stats
  player-scaling-multiplier: 1.2

  # Whether player scaling affects mob damage (true) or only health (false)
  player-scaling-affects-damage: true

  # Global multiplier for realm mob spawn counts (1.0 = no change)
  # Applied to the calculated total mob count for all realms
  # Stacks with extra-monsters map modifier
  spawn-count-multiplier: 1.0

  # Level fraction for AI-spawned minions (e.g., wolves summoned by orcs)
  # Minions get realm_level * this value (0.75 = 75% of realm level)
  # Prevents recursive degradation: all minions use the same fraction of the realm level
  minion-level-fraction: 0.75

# ═══════════════════════════════════════════════════════════════════
# Biome Mob Pools
# ═══════════════════════════════════════════════════════════════════
# Each biome has two pools: regular and boss.
# Weight affects spawn probability relative to other mobs in the pool.
#
# Note: Elite is NOT a pool - any mob can roll elite at spawn time!
#
# Valid mob IDs are found in: Assets/Server/NPC/Roles/
# Common hostile mobs:
#   Trorks: Trork_Guard, Trork_Hunter, Trork_Warrior, Trork_Brawler,
#           Trork_Sentry, Trork_Mauler, Trork_Shaman, Trork_Chieftain
#   Goblins: Goblin_Scrapper, Goblin_Lobber, Goblin_Miner, Goblin_Thief,
#            Goblin_Scavenger, Goblin_Ogre, Goblin_Duke
#   Outlanders: Outlander_Marauder, Outlander_Hunter, Outlander_Stalker,
#               Outlander_Berserker, Outlander_Brute, Outlander_Cultist,
#               Outlander_Priest, Outlander_Sorcerer, Outlander_Peon
#   Scaraks: Scarak_Fighter, Scarak_Defender, Scarak_Seeker, Scarak_Louse,
#            Scarak_Broodmother
#   Undead: Zombie, Zombie_Frost, Zombie_Burnt, Zombie_Sand, Skeleton,
#           Ghoul, Wraith, Wraith_Lantern, Shadow_Knight, Werewolf, Risen_Knight
#   Skeletons (Themed): Skeleton_Frost_Knight, Skeleton_Frost_Scout,
#           Skeleton_Frost_Archer, Skeleton_Frost_Mage,
#           Skeleton_Burnt_Knight, Skeleton_Burnt_Gunner, Skeleton_Burnt_Wizard,
#           Skeleton_Sand_Archer, Skeleton_Sand_Mage,
#           Skeleton_Pirate_Captain, Skeleton_Pirate_Striker, Skeleton_Pirate_Gunner
#   Creatures: Wolf_Black, Wolf_White, Bear_Grizzly, Bear_Polar, Crocodile,
#              Hyena, Leopard_Snow, Spider, Spider_Cave, Scorpion, Snake_Cobra,
#              Snake_Marsh, Raptor_Cave, Rex_Cave, Molerat, Rat, Toad_Rhino,
#              Toad_Rhino_Magma, Lizard_Sand
#   Plants: Snapdragon, Hedera, Bramblekin, Bramblekin_Shaman, Kweebec_Razorleaf
#   Mythic: Emberwulf, Fen_Stalker, Yeti, Cactee
#   Dragons: Dragon_Fire, Dragon_Frost
#   Void: Crawler_Void, Spectre_Void, Spawn_Void, Eye_Void, Larva_Void,
#         Golem_Guardian_Void
#   Elemental: Golem_Crystal_Earth, Golem_Crystal_Frost, Golem_Crystal_Flame,
#              Golem_Crystal_Sand, Golem_Firesteel

