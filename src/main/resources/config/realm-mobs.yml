      - id: "Trork_Warrior"
        weight: 25
      # Melee - Standard soldier
      - id: "Trork_Guard"
        weight: 20
      # Ranged - Bow attacks
      - id: "Trork_Hunter"
        weight: 20
      # Support - Magic/heals
      - id: "Trork_Shaman"
        weight: 10
      # Heavy - Slow but hard-hitting
      - id: "Trork_Mauler"
        weight: 5
    boss:
