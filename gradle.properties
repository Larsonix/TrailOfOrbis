# Gradle properties
org.gradle.jvmargs=-Xmx2G -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
org.gradle.daemon=true
org.gradle.caching=true
org.gradle.parallel=true
org.gradle.configureondemand=true

# Use Java 21 for Gradle daemon to avoid Kotlin DSL compatibility issues

# CRITICAL: Enable automatic JDK provisioning
org.gradle.java.installations.auto-download=true
org.gradle.java.installations.auto-detect=true

# Java source/target compatibility (Java 21 for maximum compatibility)
javaVersion=21

# Project metadata
projectGroup=io.github.larsonix
projectVersion=1.0.1

# Hytale Server API version is now dynamically resolved in build.gradle.kts
# using "latest.release" from https://maven.hytale.com/release
